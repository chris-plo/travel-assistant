name: "Travel Assistant"
description: "Multi-city travel planner with checklists, boarding passes, reminders and AI chat."
version: "1.0.36"
slug: travel_assistant
url: "https://github.com/chris-plo/travel-assistant"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
boot: auto

homeassistant_api: true

ingress: true
ingress_port: 8099
panel_icon: mdi:airplane
panel_title: Travel

options:
  ai_provider: "none"
  anthropic_api_key: ""
  claude_model: ""
  google_api_key: ""
  aviationstack_api_key: ""
  gcal_entity: ""

schema:
  ai_provider: "str"
  anthropic_api_key: "str"
  claude_model: "str"
  google_api_key: "str"
  aviationstack_api_key: "str"
  gcal_entity: "str"
